<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title lang="en">yoojiye web</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="site-header">
    <div class="header-inner page-grid">
      <button class="header-home-button" id="home-button" type="button" data-ko="Yoo Jiye" data-en="Yoo Jiye" lang="en">
        Yoo Jiye
      </button>

    </div>
  </header>

  <main>
    <section class="main-layout page-grid">
      <aside class="index-panel">
        <div class="project-list" id="project-list"></div>
      </aside>

      <section class="detail-panel">
        <div id="detail-content" class="detail-content">
        </div>
      </section>
  </main>

  <aside class="floating-contact page-grid" aria-label="Contact">
    <div class="floating-contact-content" id="floating-contact-content" lang="en"></div>
  </aside>

  <footer class="site-footer">
    <div class="footer-inner page-grid">
      <div class="footer-img">
        <button class="footer-img-button" id="img-button" type="button" data-ko="Img" data-en="Img" lang="en">
          Img
        </button>
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>

</html>
