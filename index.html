<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title lang="en">JY Web</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="site-header">
    <div class="header-inner page-grid">
      <button class="header-home-button" id="home-button" type="button" data-ko="Yoo Jiye" data-en="Yoo Jiye" lang="en">
        Yoo Jiye
      </button>

      <button class="header-img-button" id="img-button" type="button" data-ko="Img" data-en="Img" lang="en">
        Img
      </button>

      <button class="header-contact-button" id="contact-button" type="button" data-ko="Contact" data-en="Contact"
        lang="en">
        Contact
      </button>
    </div>
  </header>

  <main>
    <section class="main-layout page-grid">
      <aside class="index-panel">
        <div class="project-list" id="project-list"></div>
      </aside>

      <section class="detail-panel">
        <div id="detail-content" class="detail-content">
        </div>
      </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner page-grid">
      <div class="footer-lang">
        <button class="lang-toggle" id="lang-toggle" type="button" lang="en">Kr</button>
      </div>
      <button class="footer-contact" id="footer-contact-button" type="button" lang="en">
        Contact
      </button>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>

</html>
